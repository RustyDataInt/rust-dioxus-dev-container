name: Build and publish container

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build container
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Extract tool versions from Dockerfile
        run: |
          RUST_TOOLCHAIN="$(sed -nE 's/^ARG RUST_TOOLCHAIN="?([^"]+)"?/\1/p' Dockerfile)"
          DIOXUS_CLI_VERSION="$(sed -nE 's/^ARG DIOXUS_CLI_VERSION="?([^"]+)"?/\1/p' Dockerfile)"

          if [ -z "$RUST_TOOLCHAIN" ]; then
            echo "Could not determine RUST_TOOLCHAIN from Dockerfile" >&2
            exit 1
          fi

          if [ -z "$DIOXUS_CLI_VERSION" ]; then
            echo "Could not determine DIOXUS_CLI_VERSION from Dockerfile" >&2
            exit 1
          fi

          echo "RUST_TOOLCHAIN=$RUST_TOOLCHAIN" >> "$GITHUB_ENV"
          echo "DIOXUS_CLI_VERSION=$DIOXUS_CLI_VERSION" >> "$GITHUB_ENV"

          echo "Detected Rust toolchain: $RUST_TOOLCHAIN"
          echo "Detected Dioxus CLI version: $DIOXUS_CLI_VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate container metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=rust-${{ env.RUST_TOOLCHAIN }}-dx-${{ env.DIOXUS_CLI_VERSION }},enable=${{ github.event_name != 'pull_request' }}
            type=ref,event=tag,suffix=-rust-${{ env.RUST_TOOLCHAIN }}-dx-${{ env.DIOXUS_CLI_VERSION }}

      - name: Build and optionally push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RUST_TOOLCHAIN=${{ env.RUST_TOOLCHAIN }}
            DIOXUS_CLI_VERSION=${{ env.DIOXUS_CLI_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
